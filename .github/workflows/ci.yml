name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: build & test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ service-a-gateway, service-b-ledger ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x ./mvnw
          ./mvnw -B clean verify

  docker-build:
    name: docker image build
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Build service images
        run: docker compose build service-a-gateway service-b-ledger
